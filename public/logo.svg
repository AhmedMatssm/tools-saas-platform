<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="astryxo-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Icon: Abstract Cosmic Neural Star -->
  <g transform="translate(15, 15)">
    <path d="M15,0 L18,10 L28,12 L19,18 L22,28 L15,22 L8,28 L11,18 L2,12 L12,10 Z" fill="url(#astryxo-glow)" filter="url(#neon-glow)"/>
    <circle cx="15" cy="14" r="3" fill="#ffffff" />
  </g>
  <!-- Wordmark -->
  <text x="55" y="38" font-family="'Inter', sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="-1">Astryxo</text>
  <text x="165" y="22" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#6366F1">AI</text>
</svg>
